<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Analytics Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/analytics.css') }}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>Sales Analytics</h2>

        <ul class="menu">
            <li><a href="{{ url_for('dashboard') }}">🏠 Dashboard</a></li>
            <li><a href="{{ url_for('customers') }}">👥 Customers</a></li>
            <li><a href="{{ url_for('products') }}">📦 Products</a></li>
            <li><a href="{{ url_for('sales') }}">🛒 Orders</a></li>
            <li><a href="{{ url_for('reports') }}">📊 Reports</a></li>
            <li><a href="{{ url_for('analytics') }}">📈 Analytics</a></li>
            <li><a href="{{ url_for('audit_logs') }}">📝 Audit Logs</a></li>
            <li><a href="{{ url_for('logout') }}">🚪 Logout</a></li>
        </ul>

    </aside>

    <!-- Main Content -->
    <main class="main">

    <h1>Sales Analytics Dashboard</h1>

    <!-- Row 1 -->

    <div class="chart-row">

        <div class="chart-card">
            <h2>Monthly Revenue</h2>
            <canvas id="barChart"></canvas>
        </div>

        <div class="chart-card">
            <h2>Sales by Category</h2>
            <canvas id="pieChart"></canvas>
        </div>

        <div class="chart-card">
            <h2>Revenue Trend</h2>
            <canvas id="lineChart"></canvas>
        </div>

    </div>

    <!-- Row 2 -->

    <div class="chart-row">

        <div class="chart-card">
            <h2>Category Distribution</h2>
            <canvas id="doughnutChart"></canvas>
        </div>

        <div class="chart-card">
            <h2>Top 5 Selling Products</h2>
            <canvas id="topProductsChart"></canvas>
        </div>

        <div class="chart-card">
            <h2>Customer Growth</h2>
            <canvas id="customerChart"></canvas>
        </div>

    </div>

</main>


</div>

<script>

const months = {{ months|safe }};
const sales = {{ sales|safe }};

const category = {{ category_name|safe }};
const categorySales = {{ category_sales|safe }};

const topProducts = {{ top_products|safe }};
const topSales = {{ top_sales|safe }};

const customerMonths = {{ customer_months|safe }};
const customerGrowth = {{ customer_growth|safe }};

// =======================
// Monthly Revenue
// =======================

new Chart(document.getElementById("barChart"),{

    type:"bar",

    data:{

        labels:months,

        datasets:[{

            label:"Monthly Revenue",

            data:sales,

            backgroundColor:[
                "#2563eb",
                "#16a34a",
                "#dc2626",
                "#ca8a04",
                "#7c3aed",
                "#0891b2"
            ]

        }]

    },

    options:{
        responsive:true,
        plugins:{
            legend:{
                display:false
            }
        }
    }

});

// =======================
// Sales by Category
// =======================

new Chart(document.getElementById("pieChart"),{

    type:"pie",

    data:{

        labels:category,

        datasets:[{

            data:categorySales,

            backgroundColor:[
                "#2563eb",
                "#16a34a",
                "#dc2626",
                "#ca8a04",
                "#7c3aed",
                "#0891b2"
            ]

        }]

    },

    options:{
        responsive:true
    }

});

// =======================
// Revenue Trend
// =======================

new Chart(document.getElementById("lineChart"),{

    type:"line",

    data:{

        labels:months,

        datasets:[{

            label:"Revenue",

            data:sales,

            borderColor:"#2563eb",

            backgroundColor:"#93c5fd",

            fill:true,

            tension:0.4

        }]

    },

    options:{
        responsive:true
    }

});

// =======================
// Doughnut Chart
// =======================

new Chart(document.getElementById("doughnutChart"),{

    type:"doughnut",

    data:{

        labels:category,

        datasets:[{

            data:categorySales,

            backgroundColor:[
                "#2563eb",
                "#16a34a",
                "#dc2626",
                "#ca8a04",
                "#7c3aed",
                "#0891b2"
            ]

        }]

    },

    options:{
        responsive:true
    }

});

// =======================
// Top Products
// =======================

new Chart(document.getElementById("topProductsChart"),{

    type:"bar",

    data:{

        labels:topProducts,

        datasets:[{

            label:"Products Sold",

            data:topSales,

            backgroundColor:"#16a34a"

        }]

    },

    options:{
        responsive:true
    }

});

// =======================
// Customer Growth
// =======================

new Chart(document.getElementById("customerChart"),{

    type:"line",

    data:{

        labels:customerMonths,

        datasets:[{

            label:"New Customers",

            data:customerGrowth,

            borderColor:"#dc2626",

            backgroundColor:"#fecaca",

            fill:true,

            tension:0.4

        }]

    },

    options:{
        responsive:true
    }

});

</script>

</body>

</html>
