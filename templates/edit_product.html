<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Product</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/edit_product.css') }}">

</head>

<body>

<div class="container">

    <div class="form-box">

        <h1>Edit Product</h1>

        <form method="POST" enctype="multipart/form-data">

            <label>Product Name</label>
            <input type="text"
                   name="product_name"
                   value="{{ product.ProductName }}"
                   required>

            <label>Category</label>
            <input type="text"
                   name="category"
                   value="{{ product.Category }}"
                   required>

            <label>Brand</label>
            <input type="text"
                   name="brand"
                   value="{{ product.Brand }}"
                   required>

            <label>Price</label>
            <input type="number"
                   step="0.01"
                   name="price"
                   value="{{ product.Price }}"
                   required>

            <label>Stock Quantity</label>
            <input type="number"
                   name="stock"
                   value="{{ product.StockQuantity }}"
                   required>

            <label>Supplier</label>
            <input type="text"
                   name="supplier"
                   value="{{ product.Supplier }}"
                   required>

            <label>Current Image</label><br>

           {% if product.Image %}
                <img src="{{ url_for('static', filename='uploads/' + product.Image) }}"
                     width="120"
                     style="margin-bottom:15px;border-radius:8px;">
           {% else %}
                <p>No Image</p>
            {% endif %}

            <label>Change Product Image</label>

           <input
             type="file"
             name="product_image"
             accept="image/*">

            <button type="submit">

                Update Product

            </button>

        </form>

        <a href="{{ url_for('products') }}">

            Back to Products

        </a>

    </div>

</div>

</body>

</html>
